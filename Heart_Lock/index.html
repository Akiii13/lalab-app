<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>The Day We Got Together</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loading-screen">
    <div class="progress-container">
      <div class="progress-wrapper">
        <div class="progress-bar" id="progress-fill"></div>
      </div>
      <img src="../loadingscreen.png" alt="loader icon" id="progress-icon">
      <div class="tap-text">Tap to continue...</div>
    </div>
  </div>
  <audio id="bg-music" src="music.mp3" loop playsinline></audio>
  <button id="exitButton" onclick="exitGame()">EXIT GAME</button>

  <div id="lockScreen">
    <div class="lock-wrapper">
      <svg class="heart-svg" viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <filter id="hs" x="-25%" y="-20%" width="150%" height="145%">
            <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#902848" flood-opacity="0.2"/>
          </filter>
          <linearGradient id="hg" x1="0.4" y1="0" x2="0.6" y2="1">
            <stop offset="0%" stop-color="#f5c8de"/>
            <stop offset="100%" stop-color="#fce8f4"/>
          </linearGradient>
        </defs>
        <path d="M 130,218 L 130,82 A 70,70 0 0 1 270,82 L 270,218"
          fill="none" stroke="#6a1830" stroke-width="30" stroke-linecap="round"
          opacity="0.12" transform="translate(4,7)"/>
        <path d="M 130,218 L 130,82 A 70,70 0 0 1 270,82 L 270,218"
          fill="none" stroke="#b86080" stroke-width="28" stroke-linecap="round"/>
        <path d="M 130,218 L 130,82 A 70,70 0 0 1 270,82 L 270,218"
          fill="none" stroke="#d898b8" stroke-width="10" stroke-linecap="round" opacity="0.28"/>
        <path d="M 200,482 C 56,386 12,293 12,222 C 12,150 62,112 120,112 C 153,112 175,130 200,154 C 225,130 247,112 280,112 C 338,112 388,150 388,222 C 388,293 344,386 200,482 Z"
          fill="url(#hg)" filter="url(#hs)"/>
        <path d="M 200,456 C 74,370 38,290 38,224 C 38,165 78,138 124,138 C 153,138 173,155 200,178 C 227,155 247,138 276,138 C 322,138 362,165 362,224 C 362,290 326,370 200,456 Z"
          fill="none" stroke="#d898b8" stroke-width="1.5" stroke-dasharray="5,4.5" opacity="0.8"/>
        <circle cx="130" cy="200" r="17" fill="#dfa8c4"/>
        <circle cx="130" cy="200" r="10" fill="#c888a8"/>
        <circle cx="270" cy="200" r="17" fill="#dfa8c4"/>
        <circle cx="270" cy="200" r="10" fill="#c888a8"/>
        <circle cx="200" cy="392" r="15" fill="#c888a8"/>
        <rect   x="194"  y="394" width="12" height="22" rx="4" fill="#c888a8"/>
        <circle cx="200" cy="392" r="9"  fill="#fce8f4"/>
        <rect   x="197"  y="397" width="6" height="14" rx="3" fill="#fce8f4"/>
        <text x="48"  y="256" font-size="13" fill="#e0a0bc" opacity="0.45" font-family="serif">♥</text>
        <text x="328" y="250" font-size="11" fill="#e0a0bc" opacity="0.4"  font-family="serif">♥</text>
        <text x="60"  y="365" font-size="10" fill="#e0a0bc" opacity="0.35" font-family="serif">♥</text>
        <text x="316" y="370" font-size="10" fill="#e0a0bc" opacity="0.35" font-family="serif">♥</text>
        <text x="190" y="462" font-size="9"  fill="#e0a0bc" opacity="0.28" font-family="serif">♥</text>
      </svg>

      <div class="lock-content">
        <p class="lock-title">The Day<br>We Got Together</p>
        <div class="code-inputs">
          <div class="digit-box">
            <button onclick="changeDigit(0, 1)">▲</button>
            <div class="digit-value" id="digit-0">0</div>
            <button onclick="changeDigit(0, -1)">▼</button>
          </div>
          <div class="digit-box">
            <button onclick="changeDigit(1, 1)">▲</button>
            <div class="digit-value" id="digit-1">0</div>
            <button onclick="changeDigit(1, -1)">▼</button>
          </div>
          <div class="digit-box">
            <button onclick="changeDigit(2, 1)">▲</button>
            <div class="digit-value" id="digit-2">0</div>
            <button onclick="changeDigit(2, -1)">▼</button>
          </div>
          <div class="digit-box">
            <button onclick="changeDigit(3, 1)">▲</button>
            <div class="digit-value" id="digit-3">0</div>
            <button onclick="changeDigit(3, -1)">▼</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="letterScreen">
    <div id="imageWrapper">
      <div class="relativeBox">

        <svg id="letterSvg" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="ls" x="-8%" y="-8%" width="116%" height="116%">
              <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#902848" flood-opacity="0.15"/>
            </filter>
            <linearGradient id="lg" x1="0.4" y1="0" x2="0.6" y2="1">
              <stop offset="0%" stop-color="#f5c8de"/>
              <stop offset="100%" stop-color="#fce8f4"/>
            </linearGradient>
          </defs>

          <!-- Card body — height bumped to 400 for more breathing room -->
          <rect x="6" y="6" width="588" height="388" rx="24" fill="url(#lg)" filter="url(#ls)"/>

          <!-- Inner dashed border -->
          <rect x="20" y="20" width="560" height="360" rx="16"
            fill="none" stroke="#d898b8" stroke-width="1.5" stroke-dasharray="5,4.5" opacity="0.8"/>

          <!-- Scalloped dot outer border — pathLength forces even dot spacing, dashoffset centers gaps at corners -->
          <rect x="6" y="6" width="588" height="388" rx="24"
            fill="none" stroke="#b86080" stroke-width="14"
            stroke-dasharray="1 24" stroke-linecap="round" opacity="0.45"
            pathLength="1900" stroke-dashoffset="12"/>

          <!-- Corner & edge decorative hearts -->
          <text font-family="serif" font-size="13" fill="#e0a0bc">
            <tspan x="44"  y="18"  opacity="0.55">♥</tspan>
            <tspan x="144" y="18"  opacity="0.45">♥</tspan>
            <tspan x="244" y="18"  opacity="0.45">♥</tspan>
            <tspan x="344" y="18"  opacity="0.45">♥</tspan>
            <tspan x="444" y="18"  opacity="0.45">♥</tspan>
            <tspan x="540" y="18"  opacity="0.55">♥</tspan>
            <tspan x="44"  y="396" opacity="0.55">♥</tspan>
            <tspan x="144" y="396" opacity="0.45">♥</tspan>
            <tspan x="244" y="396" opacity="0.45">♥</tspan>
            <tspan x="344" y="396" opacity="0.45">♥</tspan>
            <tspan x="444" y="396" opacity="0.45">♥</tspan>
            <tspan x="540" y="396" opacity="0.55">♥</tspan>
          </text>

          <!-- Title — shifted down, left column centered at x=200 -->
          <text font-family="'Jua', sans-serif" fill="#8a2848">
            <tspan x="200" y="100" font-size="32" font-weight="bold" text-anchor="middle">HAPPY MONTHSARY</tspan>
            <tspan x="200" y="138" font-size="32" font-weight="bold" text-anchor="middle">FABOOTY!</tspan>
          </text>

          <!-- Body text — font-size 16, shifted down to match title -->
          <text font-family="'Jua', sans-serif" font-size="16" fill="#b03060" text-anchor="middle">
            <tspan x="200" y="178">Happy 39th monthsary my fabooty</tspan>
            <tspan x="200" y="202">utotie cutie pretty smexy pangga</tspan>
            <tspan x="200" y="226">lalabubu kooo!! I LOVE YOU SO</tspan>
            <tspan x="200" y="250">SO MUCH and more monthsary</tspan>
            <tspan x="200" y="274">and anniversary to come!! >:DD</tspan>
          </text>

          <!-- QR area background — square 180x180, center cx=455 cy=195 -->
          <!-- x=365 y=105 w=180 h=180 -->
          <rect x="365" y="105" width="180" height="180" rx="12" fill="#ffffff"/>
          <!-- thin themed border around QR area -->
          <rect x="365" y="105" width="180" height="180" rx="12"
            fill="none" stroke="#dfa8c4" stroke-width="3"/>

          <!-- Scratch instruction text — below QR rect (y=105+180=285) -->
          <text font-family="'Jua', sans-serif" font-size="16" fill="#8a2848" text-anchor="middle" opacity="0.85">
            <tspan x="455" y="308">Scratch to Listen how I feel</tspan>
            <tspan x="455" y="328">when I'm with you</tspan>
          </text>

          <!-- Floating accent hearts -->
          <text font-family="serif" font-size="11" fill="#e0a0bc">
            <tspan x="292" y="148" opacity="0.4">♥</tspan>
            <tspan x="36"  y="272" opacity="0.35">♥</tspan>
            <tspan x="72"  y="320" opacity="0.3">♥</tspan>
            <tspan x="272" y="350" opacity="0.28">♥</tspan>
          </text>
        </svg>

        <!-- QR code rendered here by qrcodejs — sits between SVG and scratch canvas -->
        <div id="qrCode"></div>

        <canvas id="scratchCanvas"></canvas>
      </div>
      <button id="lockAgainButton" onclick="lockAgain()">Lock Again</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
