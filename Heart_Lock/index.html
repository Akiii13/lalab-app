<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#eee8ff" />
  <link rel="manifest" href="../manifest.json" />
  <title>The Day We Got Together</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ── Loading screen ── -->
  <div id="loading-screen">
    <div class="progress-container">
      <div class="progress-wrapper">
        <div class="progress-bar" id="progress-fill"></div>
      </div>
      <img src="../loadingscreen.png" alt="loader icon" id="progress-icon">
      <div class="tap-text">Tap to continue...</div>
    </div>
  </div>

  <audio id="bg-music" src="music.mp3" loop playsinline></audio>

  <button id="exitButton" class="hidden" onclick="exitGame()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12L12 3l9 9" />
      <path d="M5 10v9a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1v-9" />
    </svg>
    HOME
  </button>


  <!-- ── Lock screen ── -->
  <div id="lockScreen">
    <div class="lock-wrapper">

      <!-- Heart-shaped padlock — violet palette -->
      <svg class="heart-svg" viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <filter id="hs" x="-25%" y="-20%" width="150%" height="145%">
            <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#4a2d90" flood-opacity="0.18" />
          </filter>
          <linearGradient id="hg" x1="0.4" y1="0" x2="0.6" y2="1">
            <stop offset="0%" stop-color="#e4d8ff" />
            <stop offset="100%" stop-color="#f5f0ff" />
          </linearGradient>
        </defs>

        <!-- Shackle shadow -->
        <path d="M 130,218 L 130,82 A 70,70 0 0 1 270,82 L 270,218" fill="none" stroke="#2e1a72" stroke-width="30"
          stroke-linecap="round" opacity="0.12" transform="translate(4,7)" />
        <!-- Shackle main -->
        <path d="M 130,218 L 130,82 A 70,70 0 0 1 270,82 L 270,218" fill="none" stroke="#7a52c0" stroke-width="28"
          stroke-linecap="round" />
        <!-- Shackle highlight -->
        <path d="M 130,218 L 130,82 A 70,70 0 0 1 270,82 L 270,218" fill="none" stroke="#bfa0ec" stroke-width="10"
          stroke-linecap="round" opacity="0.30" />

        <!-- Heart body -->
        <path
          d="M 200,482 C 56,386 12,293 12,222 C 12,150 62,112 120,112 C 153,112 175,130 200,154 C 225,130 247,112 280,112 C 338,112 388,150 388,222 C 388,293 344,386 200,482 Z"
          fill="url(#hg)" filter="url(#hs)" />

        <!-- Inner dashed border -->
        <path
          d="M 200,456 C 74,370 38,290 38,224 C 38,165 78,138 124,138 C 153,138 173,155 200,178 C 227,155 247,138 276,138 C 322,138 362,165 362,224 C 362,290 326,370 200,456 Z"
          fill="none" stroke="#bfa0ec" stroke-width="1.5" stroke-dasharray="5,4.5" opacity="0.75" />

        <!-- Shackle attachment circles -->
        <circle cx="130" cy="200" r="17" fill="#c8a8f0" />
        <circle cx="130" cy="200" r="10" fill="#a878d0" />
        <circle cx="270" cy="200" r="17" fill="#c8a8f0" />
        <circle cx="270" cy="200" r="10" fill="#a878d0" />

        <!-- Keyhole -->
        <circle cx="200" cy="392" r="15" fill="#a878d0" />
        <rect x="194" y="394" width="12" height="22" rx="4" fill="#a878d0" />
        <circle cx="200" cy="392" r="9" fill="#f5f0ff" />
        <rect x="197" y="397" width="6" height="14" rx="3" fill="#f5f0ff" />

        <!-- Floating accent hearts -->
        <text x="48" y="256" font-size="13" fill="#bfa0ec" opacity="0.45" font-family="serif">&#9829;</text>
        <text x="328" y="250" font-size="11" fill="#bfa0ec" opacity="0.40" font-family="serif">&#9829;</text>
        <text x="60" y="365" font-size="10" fill="#bfa0ec" opacity="0.35" font-family="serif">&#9829;</text>
        <text x="316" y="370" font-size="10" fill="#bfa0ec" opacity="0.35" font-family="serif">&#9829;</text>
        <text x="190" y="462" font-size="9" fill="#bfa0ec" opacity="0.28" font-family="serif">&#9829;</text>
      </svg>

      <div class="lock-content">
        <p class="lock-title">The Day<br>We Got Together</p>
        <div class="code-inputs">
          <div class="digit-box">
            <button onclick="changeDigit(0, 1)">&#9650;</button>
            <div class="digit-value" id="digit-0">0</div>
            <button onclick="changeDigit(0, -1)">&#9660;</button>
          </div>
          <div class="digit-box">
            <button onclick="changeDigit(1, 1)">&#9650;</button>
            <div class="digit-value" id="digit-1">0</div>
            <button onclick="changeDigit(1, -1)">&#9660;</button>
          </div>
          <div class="digit-box">
            <button onclick="changeDigit(2, 1)">&#9650;</button>
            <div class="digit-value" id="digit-2">0</div>
            <button onclick="changeDigit(2, -1)">&#9660;</button>
          </div>
          <div class="digit-box">
            <button onclick="changeDigit(3, 1)">&#9650;</button>
            <div class="digit-value" id="digit-3">0</div>
            <button onclick="changeDigit(3, -1)">&#9660;</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Letter screen ── -->
  <div id="letterScreen">
    <div id="imageWrapper">
      <div class="relativeBox">

        <!-- Letter card SVG — violet palette -->
        <svg id="letterSvg" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="ls" x="-8%" y="-8%" width="116%" height="116%">
              <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#4a2d90" flood-opacity="0.14" />
            </filter>
            <linearGradient id="lg" x1="0.4" y1="0" x2="0.6" y2="1">
              <stop offset="0%" stop-color="#e4d8ff" />
              <stop offset="100%" stop-color="#f5f0ff" />
            </linearGradient>
          </defs>

          <!-- Card body -->
          <rect x="6" y="6" width="588" height="388" rx="24" fill="url(#lg)" filter="url(#ls)" />

          <!-- Inner dashed border -->
          <rect x="20" y="20" width="560" height="360" rx="16" fill="none" stroke="#bfa0ec" stroke-width="1.5"
            stroke-dasharray="5,4.5" opacity="0.80" />

          <!-- Scalloped dot outer border -->
          <rect x="6" y="6" width="588" height="388" rx="24" fill="none" stroke="#7a52c0" stroke-width="14"
            stroke-dasharray="1 24" stroke-linecap="round" opacity="0.42" pathLength="1900" stroke-dashoffset="12" />

          <!-- Corner & edge decorative hearts -->
          <text font-family="serif" font-size="13" fill="#bfa0ec">
            <tspan x="44" y="18" opacity="0.55">&#9829;</tspan>
            <tspan x="144" y="18" opacity="0.45">&#9829;</tspan>
            <tspan x="244" y="18" opacity="0.45">&#9829;</tspan>
            <tspan x="344" y="18" opacity="0.45">&#9829;</tspan>
            <tspan x="444" y="18" opacity="0.45">&#9829;</tspan>
            <tspan x="540" y="18" opacity="0.55">&#9829;</tspan>
            <tspan x="44" y="396" opacity="0.55">&#9829;</tspan>
            <tspan x="144" y="396" opacity="0.45">&#9829;</tspan>
            <tspan x="244" y="396" opacity="0.45">&#9829;</tspan>
            <tspan x="344" y="396" opacity="0.45">&#9829;</tspan>
            <tspan x="444" y="396" opacity="0.45">&#9829;</tspan>
            <tspan x="540" y="396" opacity="0.55">&#9829;</tspan>
          </text>

          <!-- Title -->
          <text font-family="'Nunito', sans-serif" fill="#4a2d90">
            <tspan x="193" y="100" font-size="28" font-weight="800" text-anchor="middle">HAPPY MONTHSARY</tspan>
            <tspan x="193" y="132" font-size="28" font-weight="800" text-anchor="middle">FABOOTY!</tspan>
          </text>

          <!-- Body text -->
          <text font-family="'Nunito', sans-serif" font-size="16" font-weight="700" fill="#6040a8" text-anchor="middle">
            <tspan x="193" y="170">Happy 39th monthsary my fabooty</tspan>
            <tspan x="193" y="194">utotie cutie pretty smexy pangga</tspan>
            <tspan x="193" y="218">lalabubu kooo!! I LOVE YOU SO</tspan>
            <tspan x="193" y="242">SO MUCH and more monthsary</tspan>
            <tspan x="193" y="266">and anniversary to come!! &gt;:DD</tspan>
          </text>

          <!-- QR area background -->
          <rect x="365" y="105" width="180" height="180" rx="12" fill="#ffffff" />
          <!-- QR border -->
          <rect x="365" y="105" width="180" height="180" rx="12" fill="none" stroke="#c8a8f0" stroke-width="3" />

          <!-- Scratch instruction -->
          <text font-family="'Nunito', sans-serif" font-size="16" font-weight="700" fill="#4a2d90" text-anchor="middle"
            opacity="0.85">
            <tspan x="455" y="308">Scratch to Listen how I feel</tspan>
            <tspan x="455" y="328">when I&#x27;m with you</tspan>
          </text>

          <!-- Floating accent hearts -->
          <text font-family="serif" font-size="11" fill="#bfa0ec">
            <tspan x="292" y="148" opacity="0.40">&#9829;</tspan>
            <tspan x="36" y="272" opacity="0.35">&#9829;</tspan>
            <tspan x="72" y="320" opacity="0.30">&#9829;</tspan>
            <tspan x="272" y="350" opacity="0.28">&#9829;</tspan>
          </text>
        </svg>

        <!-- QR code rendered by qrcodejs -->
        <div id="qrCode"></div>

        <canvas id="scratchCanvas"></canvas>
      </div>
      <button id="lockAgainButton" onclick="lockAgain()">Lock Again</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
