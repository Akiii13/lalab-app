<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#faf0ed" />
  <link rel="manifest" href="manifest.json" />
  <title>Valentine's Date</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body oncontextmenu="return false">

  <!-- SVG sprite -->
  <svg style="display:none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <symbol id="ico-heart" viewBox="0 0 20 18">
        <path
          d="M10 16.5C10 16.5 2 11 2 6C2 3.8 3.8 2 6 2C7.5 2 9 2.8 10 4C11 2.8 12.5 2 14 2C16.2 2 18 3.8 18 6C18 11 10 16.5 10 16.5Z" />
      </symbol>
    </defs>
  </svg>

  <!-- Decorative floating hearts -->
  <div class="bg-deco" aria-hidden="true">
    <svg class="deco-h deco-h--lg">
      <use href="#ico-heart" />
    </svg>
    <svg class="deco-h deco-h--md">
      <use href="#ico-heart" />
    </svg>
    <svg class="deco-h deco-h--sm">
      <use href="#ico-heart" />
    </svg>
    <svg class="deco-h deco-h--xs">
      <use href="#ico-heart" />
    </svg>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="progress-container">
      <div class="progress-wrapper">
        <div class="progress-bar" id="progress-fill"></div>
      </div>
      <img src="../loadingscreen.png" alt="" id="progress-icon">
      <div class="tap-text">Tap to continue</div>
    </div>
  </div>

  <audio id="bg-music" src="music.mp3" loop playsinline></audio>

  <button id="exit-button" class="hidden" onclick="exitGame()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12L12 3l9 9" />
      <path d="M5 10v9a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1v-9" />
    </svg>
    HOME
  </button>

  <!-- Index page -->
  <div id="page-index" class="page active">
    <div class="header">
      <video class="responsive-video" src="images/VALENTINE.mp4" muted loop playsinline></video>
      <p>WILL YOU BE MY VALENTINE?</p>
    </div>
    <div class="button-container">
      <button class="button btn-yes" id="yes-button" onclick="goTo('yes')">YES</button>
      <button class="button btn-no" onclick="handleNoClick()">NO</button>
    </div>
  </div>

  <!-- No page 1 -->
  <div id="page-no1" class="page">
    <div class="header">
      <p>WILL YOU BE MY VALENTINE?</p>
    </div>
    <div class="button-container">
      <button class="button btn-yes" onclick="goTo('yes')">YES</button>
      <button class="button btn-no" id="no-button-1" onclick="handleNoClick()">NO</button>
    </div>
    <div class="img-message">
      <p>I think you missed clicked 😅</p>
      <video class="responsive-video" src="images/NO1.mp4" muted loop playsinline></video>
    </div>
  </div>

  <!-- No page 2 -->
  <div id="page-no2" class="page">
    <div class="header">
      <p>WILL YOU BE MY VALENTINE?</p>
    </div>
    <div class="button-container">
      <button class="button btn-yes" onclick="goTo('yes')">YES</button>
      <button class="button btn-no" id="no-button-2" onclick="handleNoClick()">NO</button>
    </div>
    <div class="img-message">
      <p>You don't love me anymore? 😟</p>
      <video class="responsive-video" src="images/NO2.mp4" muted loop playsinline></video>
    </div>
  </div>

  <!-- No page 3 -->
  <div id="page-no3" class="page">
    <div class="header">
      <p>WILL YOU BE MY VALENTINE?</p>
    </div>
    <div class="button-container">
      <button class="button btn-yes" onclick="goTo('yes')">YES</button>
      <button class="button btn-yes-soft" onclick="goTo('yes')">YES</button>
    </div>
    <div class="img-message">
      <p>I know you're just messing with me 😚</p>
      <video class="responsive-video" src="images/NO3.mp4" muted loop playsinline></video>
    </div>
  </div>

  <!-- Yes page -->
  <div id="page-yes" class="page">
    <div class="header">
      <p>WILL YOU BE MY VALENTINE?</p>
    </div>
    <div class="button-container">
      <button class="button btn-yes" onclick="goTo('yes')">YES</button>
      <button class="button faded-button" onclick="resetGame()">LET ME THINK AGAIN</button>
    </div>
    <div id="fancy-message">
      <p>YEHEYY!!! 🎉 THANK YOU, MY BUBU!! 🥳💖</p>
      <video class="responsive-video" src="images/YES.mp4" muted loop playsinline></video>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
