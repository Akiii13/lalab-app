<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f78da7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LalaHub">
  <title>LalaHub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" sizes="192x192" href="icon-192.png" />
  <link rel="icon" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
</head>
<body>
  <audio id="bg-music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <header class="app-header">
    <div class="header-inner">
      <img src="icon-192.png" alt="LalaHub" class="header-logo" />
      <h1 class="header-title">LalaHub</h1>
      <button id="force-update" class="update-icon" aria-label="Force update">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="deco-bg" aria-hidden="true">
    <span class="dh dh1">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </span>
    <span class="dh dh2">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z"/></svg>
    </span>
    <span class="dh dh3">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </span>
    <span class="dh dh4">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
    </span>
    <span class="dh dh5">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </span>
  </div>

  <main class="content">

    <section class="section">
      <div class="section-header">
        <span class="section-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M21.58 16.09l-1.09-7.66C20.21 6.46 18.52 5 16.53 5H7.47C5.48 5 3.79 6.46 3.51 8.43l-1.09 7.66C2.2 17.63 3.39 19 4.94 19c.68 0 1.32-.27 1.8-.75L9 16h6l2.25 2.25c.48.48 1.13.75 1.8.75 1.56 0 2.75-1.37 2.53-2.91zM11 11H9v2H8v-2H6v-1h2V8h1v2h2v1zm4 1c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2-3c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
        </span>
        <span class="section-title">Games</span>
      </div>
      <div class="grid">
        <div class="game-card">
          <a href="Dubu_Memory_Match/index.html">
            <div class="card-img-wrap">
              <img src="Hub_Images/Dubu_Memory_Match.png" alt="Dubu Memory Match" loading="lazy" />
            </div>
            <div class="card-info">
              <p class="card-name">Dubu Memory Match</p>
              <p class="card-date">09/17/24</p>
            </div>
          </a>
        </div>
        <div class="game-card">
          <a href="Guess_Bubus_Emotions/index.html">
            <div class="card-img-wrap">
              <img src="Hub_Images/Guess_Bubus_Emotions.png" alt="Guess Bubu's Emotions" loading="lazy" />
            </div>
            <div class="card-info">
              <p class="card-name">Guess Bubu's Emotions</p>
              <p class="card-date">10/06/24</p>
            </div>
          </a>
        </div>
        <div class="game-card">
          <a href="Dubu_Maze/index.html">
            <div class="card-img-wrap">
              <img src="Hub_Images/Dubu_Maze.png" alt="Dubu Maze" loading="lazy" />
            </div>
            <div class="card-info">
              <p class="card-name">Dubu Maze</p>
              <p class="card-date">09/02/25</p>
            </div>
          </a>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <span class="section-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z"/></svg>
        </span>
        <span class="section-title">Specials</span>
      </div>
      <div class="grid">
        <div class="game-card">
          <a href="Be_My_Valentine/index.html">
            <div class="card-img-wrap">
              <img src="Hub_Images/Be_My_Valentine.png" alt="Be My Valentine" loading="lazy" />
            </div>
            <div class="card-info">
              <p class="card-name">Be My Valentine</p>
              <p class="card-date">02/11/24</p>
            </div>
          </a>
        </div>
        <div class="game-card">
          <a href="Heart_Lock/index.html">
            <div class="card-img-wrap">
              <img src="Hub_Images/Heart_Lock.png" alt="Heart Lock" loading="lazy" />
            </div>
            <div class="card-info">
              <p class="card-name">Heart Lock</p>
              <p class="card-date">06/15/25</p>
            </div>
          </a>
        </div>
        <div class="game-card">
          <a href="Digital_Flower/index.html">
            <div class="card-img-wrap">
              <img src="Hub_Images/Digital_Flower.png" alt="Digital Flower" loading="lazy" />
            </div>
            <div class="card-info">
              <p class="card-name">Digital Flower</p>
              <p class="card-date">07/13/25</p>
            </div>
          </a>
        </div>
        <div class="game-card">
          <a href="Dubu_Photobooth/index.html">
            <div class="card-img-wrap">
              <img src="Hub_Images/Dubu_Photobooth.png" alt="Dubu Photobooth" loading="lazy" />

          </a>
        </div>
        <div class="game-card">
          <a href="Dubu_4Anniversary/index.html">
            <div class="card-img-wrap">
              <img src="Hub_Images/Dubu_4Anniversary.jpg" alt="Dubu 4th Anniversary" loading="lazy" />
            </div>
            <div class="card-info">
              <p class="card-name">Dubu 4th Anniversary</p>
              <p class="card-date">04/13/26</p>
            </div>
          </a>
        </div>
        <div class="game-card game-card--secret" id="secret-card">
          <a href="secret/index.html">
            <div class="card-img-wrap card-img-wrap--locked">
              <span class="lock-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
            </div>
            <div class="card-info">
              <p class="card-name card-name--secret">???</p>
              <p class="card-date">??/??/??</p>
            </div>
          </a>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');

</body>
</html>
